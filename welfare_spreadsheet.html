<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welfare Complaints Spreadsheet</title>
    <link rel="stylesheet" href="/assets/style.css">
    <style>
        body { background: #f4f8ff; font-family: Arial, sans-serif; }
        .container { max-width: 1100px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 8px 32px #00336622; padding: 32px; }
        h1 { color: #003366; margin-bottom: 18px; }
        .actions { margin-bottom: 18px; }
        .actions button, .actions a { margin-right: 12px; padding: 10px 18px; border-radius: 6px; border: none; background: #003366; color: #fff; font-weight: bold; text-decoration: none; transition: background 0.2s; }
        .actions button:hover, .actions a:hover { background: #00509e; }
        table { width: 100%; border-collapse: collapse; margin-top: 18px; }
        th, td { border: 1px solid #e0e7ef; padding: 10px; text-align: left; }
        th { background: #e3f0ff; color: #003366; }
        tr:nth-child(even) { background: #f9fafb; }
        td.editing { background: #fffbe6; }
        td input, td textarea { width: 100%; border: 1px solid #b0c4de; border-radius: 4px; padding: 4px; font-size: 14px; }
        td textarea { resize: vertical; min-height: 32px; }
        .upload-section { margin-top: 24px; }
        .upload-section input[type=file] { margin-right: 8px; }
        .success-msg, .error-msg { margin-top: 12px; padding: 10px; border-radius: 6px; font-size: 14px; display: none; }
        .success-msg { background: #dcfce7; color: #166534; border: 1px solid #59d997; }
        .error-msg { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welfare Complaints Spreadsheet</h1>
        <div class="actions">
            <a href="/views/admin.html">⬅ Back to Dashboard</a>
            <button onclick="downloadExcel()">⬇ Download Excel</button>
            <button onclick="fetchComplaints()">🔄 Refresh Table</button>
            <button id="saveAllBtn" style="background:#28a745;">💾 Save All Changes</button>
            <input type="text" id="searchInput" placeholder="Search..." style="padding:8px 12px;border-radius:6px;border:1px solid #ccc;width:220px;">
        </div>
        <table id="complaintsTable">
            <thead>
                <tr>
                    <th>Applicant Name</th>
                    <th>Location</th>
                    <th>Employer</th>
                    <th>Agency</th>
                    <th>Category</th>
                    <th>Urgency</th>
                    <th>Description</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="8" style="text-align:center;">Loading...</td></tr>
            </tbody>
        </table>
        <div style="margin-top:18px;text-align:center;">
            <button id="prevPageBtn" style="padding:6px 14px;margin-right:8px;">Prev</button>
            <span id="pageInfo">Page 1</span>
            <button id="nextPageBtn" style="padding:6px 14px;margin-left:8px;">Next</button>
        </table>
        <div class="upload-section">
            <h3>Import Complaints from Excel</h3>
            <input type="file" id="excelFile" accept=".xlsx,.xls">
            <button onclick="uploadExcel()">Upload</button>
            <div class="success-msg" id="successMsg"></div>
            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="notifyMsg" style="display:none;"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
                document.getElementById('saveAllBtn').onclick = async function() {
                    try {
                        const res = await fetch('/api/welfare-complaints/import', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ complaints: complaintsData })
                        });
                        if (!res.ok) throw new Error('Save failed');
                        showNotification('All changes saved to server!', true);
                        fetchComplaints();
                    } catch (err) {
                        showNotification('Failed to save: ' + err.message, false);
                    }
                };
        // --- Pagination, Search, and Notification Enhancements ---
        let complaintsData = [];
        let filteredData = [];
        let currentPage = 1;
        const pageSize = 10;

        function showNotification(msg, success=true) {
            const notify = document.getElementById('notifyMsg');
            notify.textContent = msg;
            notify.className = success ? 'success-msg' : 'error-msg';
            notify.style.display = 'block';
            setTimeout(() => { notify.style.display = 'none'; }, 2500);
        }

        async function fetchComplaints() {
            const tableBody = document.querySelector('#complaintsTable tbody');
            tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;">Loading...</td></tr>';
            try {
                const res = await fetch('/api/welfare-complaints');
                const data = await res.json();
                complaintsData = Array.isArray(data) ? data : [];
                filteredData = complaintsData;
                currentPage = 1;
                renderTable();
            } catch (err) {
                tableBody.innerHTML = `<tr><td colspan="8" style="color:red;text-align:center;">Failed to load data.</td></tr>`;
            }
        }

        function renderTable() {
            const tableBody = document.querySelector('#complaintsTable tbody');
            const pageInfo = document.getElementById('pageInfo');
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filteredData.slice(start, end);
            if (pageData.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;">No complaints found.</td></tr>';
            } else {
                tableBody.innerHTML = pageData.map((row, idx) => `<tr>
                    <td data-field="applicantName" data-idx="${start+idx}" ondblclick="editCell(this)">${row.applicantName||''}</td>
                    <td data-field="location" data-idx="${start+idx}" ondblclick="editCell(this)">${row.location||''}</td>
                    <td data-field="employerName" data-idx="${start+idx}" ondblclick="editCell(this)">${row.employerName||''}</td>
                    <td data-field="agencyName" data-idx="${start+idx}" ondblclick="editCell(this)">${row.agencyName||''}</td>
                    <td data-field="category" data-idx="${start+idx}" ondblclick="editCell(this)">${row.category||''}</td>
                    <td data-field="urgency" data-idx="${start+idx}" ondblclick="editCell(this)">${row.urgency||''}</td>
                    <td data-field="description" data-idx="${start+idx}" ondblclick="editCell(this)">${row.description||''}</td>
                    <td>${row.date ? new Date(row.date).toLocaleString() : ''}</td>
                </tr>`).join('');
            }
            const totalPages = Math.max(1, Math.ceil(filteredData.length / pageSize));
            pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prevPageBtn').disabled = currentPage === 1;
            document.getElementById('nextPageBtn').disabled = currentPage === totalPages;
        }

        // Inline editing logic
        window.editCell = function(td) {
            if (td.classList.contains('editing')) return;
            td.classList.add('editing');
            const field = td.getAttribute('data-field');
            const idx = parseInt(td.getAttribute('data-idx'));
            const oldValue = td.textContent;
            let input;
            if (field === 'description') {
                input = document.createElement('textarea');
                input.rows = 2;
            } else {
                input = document.createElement('input');
                input.type = 'text';
            }
            input.value = oldValue;
            input.onblur = function() { saveEdit(td, input.value, field, idx); };
            input.onkeydown = function(e) { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } };
            td.innerHTML = '';
            td.appendChild(input);
            input.focus();
        };

        window.saveEdit = function(td, newValue, field, idx) {
            td.classList.remove('editing');
            td.innerHTML = newValue;
            // Update in-memory data
            complaintsData[idx][field] = newValue;
            filteredData[idx][field] = newValue;
            showNotification('Cell updated (not yet saved to server)', true);
        };

        document.getElementById('prevPageBtn').onclick = function() {
            if (currentPage > 1) { currentPage--; renderTable(); }
        };
        document.getElementById('nextPageBtn').onclick = function() {
            const totalPages = Math.max(1, Math.ceil(filteredData.length / pageSize));
            if (currentPage < totalPages) { currentPage++; renderTable(); }
        };

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const q = e.target.value.trim().toLowerCase();
            filteredData = complaintsData.filter(row =>
                Object.values(row).some(val => String(val).toLowerCase().includes(q))
            );
            currentPage = 1;
            renderTable();
        });
        function downloadExcel() {
            showNotification('Downloading Excel...');
            window.location.href = '/api/welfare-complaints/excel';
        }
        async function uploadExcel() {
            const fileInput = document.getElementById('excelFile');
            const successMsg = document.getElementById('successMsg');
            const errorMsg = document.getElementById('errorMsg');
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            if (!fileInput.files.length) {
                errorMsg.textContent = 'Please select an Excel file.';
                errorMsg.style.display = 'block';
                return;
            }
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet);
                    // Send to backend
                    const res = await fetch('/api/welfare-complaints/import', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ complaints: json })
                    });
                    if (!res.ok) throw new Error('Import failed');
                    showNotification('Complaints imported successfully!');
                    fetchComplaints();
                } catch (err) {
                    errorMsg.textContent = 'Failed to import: ' + err.message;
                    errorMsg.style.display = 'block';
                }
            };
            reader.readAsArrayBuffer(file);
        }
        fetchComplaints();
    </script>
</body>
</html>
